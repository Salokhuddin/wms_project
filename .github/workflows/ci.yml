name: WMS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: wms_db
          POSTGRES_USER: wms_user
          POSTGRES_PASSWORD: wms_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U wms_user -d wms_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run linter
        run: ruff check .

      - name: Run tests
        env:
          DATABASE_NAME: wms_db
          DATABASE_USER: wms_user
          DATABASE_PASSWORD: wms_password
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
        run: python manage.py test